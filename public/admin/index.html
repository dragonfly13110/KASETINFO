<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จัดการเนื้อหา | คลังความรู้เกษตรตำบล Infographic</title>
  <link rel="icon" href="/admin-favicon.svg"> <!-- Use a distinct admin favicon -->
  
  <!-- Netlify Identity Widget -->
  <!-- Script will be injected by Netlify during build if Identity is enabled -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
  
  <!-- Decap CMS script -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  
  <style>
    body { font-family: sans-serif; margin: 0; }
    #nc-root { min-height: 100vh; }
  </style>
</head>
<body>
  <!-- 
    API keys should NOT be set here client-side.
    The cms-integration.js will call a Netlify Function,
    which securely accesses API keys from Netlify's environment variables.
  -->
  <script src="./cms-integration.js"></script>
</body>
</html>
